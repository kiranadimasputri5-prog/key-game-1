<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KARAOKE BATTLE: 2000-2015 MEGA HITS</title>
    <style>
        body {
            background: #0f0c29;
            color: white;
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #24243e 0%, #0f0c29 100%);
            overflow: hidden;
            padding: 10px;
        }

        h1 { 
            color: #00f2fe; 
            text-shadow: 0 0 10px #00f2fe; 
            margin-bottom: 12px; 
            text-transform: uppercase; 
            font-size: 1.5rem; 
            letter-spacing: 2px;
            margin-top: 0;
        }

        .container { 
            display: flex; 
            gap: 15px; 
            width: 98%; 
            max-width: 950px;
        }

        .panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.75);
            border: 3px solid #00f2fe;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 270px;
        }

        h2 { font-size: 0.7rem; color: #ff0080; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; margin-bottom: 8px; }

        .photo-area { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 8px 0; }

        .avatar {
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 4px solid #fff; object-fit: cover; background: #333;
            transition: 0.3s; opacity: 0.4;
        }

        .vs { font-size: 1.2rem; font-weight: bold; color: #00f2fe; }

        .name-box { font-size: 1.3rem; font-weight: bold; margin-top: 5px; min-height: 30px; }

        .song-box {
            font-size: 1.4rem; font-weight: bold; color: #f6d365;
            text-shadow: 2px 2px 0px #000; min-height: 90px;
            display: flex; align-items: center; justify-content: center;
            line-height: 1.2;
            padding: 0 10px;
        }

        #song-count { font-size: 0.7rem; color: #7f7fd5; margin-top: 5px; }

        button {
            margin-top: 15px; padding: 12px 40px; font-size: 1.3rem;
            background: #ff0080; color: white; border: none; border-radius: 50px;
            cursor: pointer; font-weight: bold; box-shadow: 0 5px 0 #910048; transition: 0.1s;
        }

        button:hover { background: #ff2a93; transform: scale(1.02); }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #910048; }
        button:disabled { background: #444; opacity: 0.5; box-shadow: 0 5px 0 #222; }

        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }

        .winner-text { color: #00ff88 !important; text-shadow: 0 0 15px #00ff88; transition: 0.4s; }
        .winner-img { opacity: 1 !important; border-color: #00ff88 !important; transform: scale(1.1); z-index: 10; }

        .flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 99; }
    </style>
</head>
<body>

    <div class="flash" id="flash"></div>
    <h1>🎤 BESTIE ROULETTE 🎤</h1>

    <div class="container">
        <div class="panel">
            <h2>DUET MAUT</h2>
            <div class="photo-area">
                <img src="key run a.png" id="imgA" class="avatar">
                <div class="vs">&</div>
                <img src="sachol.jpeg" id="imgB" class="avatar">
            </div>
            <div class="name-box" id="name-display">SIAPA YA?</div>
        </div>

        <div class="panel">
            <h2>LAGU</h2>
            <div class="song-box" id="song-display">? ? ?</div>
            <div id="song-count">Tersisa: -- lagu</div>
        </div>
    </div>

    <button id="rollBtn">MULAI ACAK!</button>

    <script>
        const people = [
            { n: "Key Run A", i: "key run a.png" },
            { n: "Sachol", i: "sachol.jpeg" },
            { n: "Hima", i: "hima.jpeg" },
            { n: "Sena", i: "sena.jpeg" }
        ];

        const masterSongs = [
            // INDO (2000-2015)
            "Sind3ntosca - Kepompong", "Project Pop - Ingatlah Hari Ini", "Project Pop - Bukan Superstar", "Project Pop - Goyang Duyu", "Project Pop - Jangan Pikir-Pikir",
            "Sheila On 7 - Sahabat Sejati", "Sheila On 7 - Lapang Dada", "Sheila On 7 - Melompat Lebih Tinggi", "Sheila On 7 - Sebuah Kisah Klasik",
            "Peterpan - Menghapus Jejakmu", "Peterpan - Mungkin Nanti", "Peterpan - Ada Apa Denganmu", "Noah - Separuh Aku", "Noah - Hidup Untukmu Mati Untukmu",
            "D'Masiv - Jangan Menyerah", "D'Masiv - Cinta Ini Membunuhku", "Nidji - Laskar Pelangi", "Nidji - Hapus Aku", "Nidji - Biarlah",
            "Tulus - Sewindu", "Tulus - Gajah", "Tulus - Jangan Cintai Aku Apa Adanya", "RAN - Pandangan Pertama", "RAN - Dekat di Hati",
            "Vierra - Bersamamu", "Vierra - Dengarkan Curhatku", "The Changcuters - I Love U Bibeh", "The Changcuters - Main Serong",
            "Ungu - Tercipta Untukku", "Ungu - Demi Waktu", "Ungu - Hampa Hatiku", "Letto - Sandaran Hati", "Letto - Ruang Rindu",
            "Maliq & D'Essentials - Pilihanku", "Maliq & D'Essentials - Untitled", "Geisha - Lumpuhkan Ingatanku", "GAC - Bahagia",
            "Bondan Prakoso - Ya Sudahlah", "Bondan Prakoso - Bunga", "Kangen Band - Yolanda", "ST12 - Puspa", "Armada - Pemilik Hati",
            "Last Child ft. Giselle - Seluruh Nafas Ini", "Ipang - Sahabat Kecil", "Kotak - Beraksi", "Kotak - Pelan-Pelan Saja",
            // BARAT / MANCANEGARA (2000-2015)
            "Justin Bieber - Baby", "Justin Bieber - Love Yourself", "One Direction - What Makes You Beautiful", "One Direction - Night Changes", "One Direction - Story of My Life",
            "Bruno Mars - Just The Way You Are", "Bruno Mars - The Lazy Song", "Bruno Mars - Count On Me", "Jason Mraz - I'm Yours", "Jason Mraz - Lucky",
            "Taylor Swift - Love Story", "Taylor Swift - You Belong With Me", "Taylor Swift - Shake It Off", "Coldplay - Yellow", "Coldplay - Viva La Vida", "Coldplay - Fix You",
            "Maroon 5 - Sugar", "Maroon 5 - Sunday Morning", "Maroon 5 - This Love", "Carly Rae Jepsen - Call Me Maybe", "Pharrell Williams - Happy",
            "Owl City - Fireflies", "Avril Lavigne - Complicated", "Avril Lavigne - Sk8er Boi", "Simple Plan - Welcome to My Life", "Simple Plan - Perfect",
            "Katy Perry - Firework", "Katy Perry - Roar", "Magic! - Rude", "Train - Hey, Soul Sister", "Passenger - Let Her Go", "Ed Sheeran - Thinking Out Loud",
            "Miley Cyrus - Party In The U.S.A.", "Daniel Powter - Bad Day", "James Blunt - You're Beautiful"
        ];

        let availableSongs = [...masterSongs];
        const btn = document.getElementById('rollBtn');
        const imgA = document.querySelector('.photo-area img:nth-child(1)');
        const imgB = document.querySelector('.photo-area img:nth-child(3)');
        const nameDisp = document.getElementById('name-display');
        const songDisp = document.getElementById('song-display');
        const songCount = document.getElementById('song-count');
        const flash = document.getElementById('flash');
        
        let audioCtx;
        songCount.innerText = `Tersisa: ${availableSongs.length} lagu`;

        function beep(f, d, t='sine') {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.setValueAtTime(0.04, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        btn.onclick = () => {
            if (availableSongs.length === 0) {
                alert("75 lagu sudah dinyanyikan! Gila kalian kuat banget. Reset ulang ya!");
                availableSongs = [...masterSongs];
                songCount.innerText = `Tersisa: ${availableSongs.length} lagu`;
                return;
            }

            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            btn.disabled = true;

            document.querySelectorAll('.panel').forEach(p => p.classList.add('shaking'));
            document.querySelectorAll('.avatar').forEach(a => { a.classList.remove('winner-img'); a.style.opacity = 1; });
            nameDisp.classList.remove('winner-text');
            songDisp.classList.remove('winner-text');

            let count = 0;
            const roll = setInterval(() => {
                const r1 = Math.floor(Math.random() * people.length);
                let r2 = Math.floor(Math.random() * people.length);
                while(r1 === r2) r2 = Math.floor(Math.random() * people.length);

                imgA.src = people[r1].i;
                imgB.src = people[r2].i;
                nameDisp.innerText = `${people[r1].n} & ${people[r2].n}`;
                songDisp.innerText = masterSongs[Math.floor(Math.random() * masterSongs.length)];
                
                beep(400 + (count * 12), 0.1);
                count++;
                if(count > 25) {
                    clearInterval(roll);
                    finishRoll();
                }
            }, 100);
        };

        function finishRoll() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('shaking'));
            const songIndex = Math.floor(Math.random() * availableSongs.length);
            const pickedSong = availableSongs.splice(songIndex, 1)[0];
            
            songDisp.innerText = pickedSong;
            songCount.innerText = `Tersisa: ${availableSongs.length} lagu`;

            imgA.classList.add('winner-img');
            imgB.classList.add('winner-img');
            nameDisp.classList.add('winner-text');
            songDisp.classList.add('winner-text');

            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 100);

            setTimeout(() => beep(220, 0.5, 'square'), 0);
            setTimeout(() => beep(220, 0.5, 'square'), 250);
            setTimeout(() => {
                beep(110, 1.2, 'square');
                btn.disabled = false;
                btn.innerText = (availableSongs.length === 0) ? "RESET" : "NEXT DUET";
            }, 500);
        }
    </script>
</body>
</html>
